name: Build Container Images

on:
  push:
    tags:
      - "image/v*"
    paths-ignore:
      - "charts/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "charts/**"

permissions:
  contents: read
  packages: write

env:
  IMAGES: ghcr.io/2bits-xanda/amy-hapi-fhir-jpaserver
  PLATFORMS: linux/amd64,linux/arm64/v8

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - name: Container meta for default (distroless) image
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGES }}
          tags: |
            type=match,pattern=image/(.*),group=1,enable=${{github.event_name != 'pull_request'}}


      - name: Container meta for tomcat image
        id: docker_tomcat_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGES }}
          tags: |
            type=match,pattern=image/(.*),group=1,enable=${{github.event_name != 'pull_request'}}
          flavor: |
            suffix=-tomcat,onlatest=true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push default (distroless) image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: |
            ${{ steps.docker_meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/2Bits-XandA/amy-hapi-fhir-jpaserver
            org.opencontainers.image.description=AmyVet HAPI FHIR JPA Server - customized for veterinary domain
            org.opencontainers.image.licenses=Apache-2.0
          platforms: ${{ env.PLATFORMS }}
          target: default

      - name: Build and push tomcat image
        id: docker_build_tomcat
        uses: docker/build-push-action@v5
        with:
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_tomcat_meta.outputs.tags }}
          labels: |
            ${{ steps.docker_tomcat_meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/2Bits-XandA/amy-hapi-fhir-jpaserver
            org.opencontainers.image.description=AmyVet HAPI FHIR JPA Server (Tomcat) - customized for veterinary domain
            org.opencontainers.image.licenses=Apache-2.0
          platforms: ${{ env.PLATFORMS }}
          target: tomcat
